<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ice Cream Icon Preview</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 241, 191, 0.65), transparent 32%),
          linear-gradient(180deg, #fffaf3 0%, #fff7ed 100%);
        font-family: Inter, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      }

      .card {
        width: min(90vw, 760px);
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(0, 0, 0, 0.05);
        border-radius: 56px;
        box-shadow:
          0 30px 80px rgba(214, 159, 68, 0.12),
          0 10px 24px rgba(0, 0, 0, 0.06);
      }

      svg {
        width: 78%;
        height: auto;
        display: block;
      }
    </style>
  </head>

    <div class="card">
